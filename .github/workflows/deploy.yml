name: Deploy to Vercel

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: barnova-village-2026/package.json

      - name: Install dependencies
        run: cd barnova-village-2026 && npm install

      - name: Build
        run: cd barnova-village-2026 && npm run build
        env:
          NEXT_PUBLIC_WP_API_URL: https://primariabarnova.ro/wp-json/wp/v2
