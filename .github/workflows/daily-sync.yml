name: Sincronizare Zilnică Date
on:
  schedule:
    # Rulează în fiecare zi la ora 04:00 UTC (07:00 ora României)
    - cron: '0 4 * * *'
  workflow_dispatch: # Permite rularea manuală

jobs:
  sync-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: daily-sync-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scrape Leadership Data
        run: npm run scrape:leadership

      - name: Fetch BEC Election Data
        run: npm run fetch:bec

      - name: Check for changes
        id: git-check
        run: |
          if ! git diff --quiet -- public/data/leadership.json; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and Push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/leadership.json
          git commit -m "chore: actualizare automată date conducere [cron]"
          git push
